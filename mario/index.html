<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini Mario</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    font-family: system-ui, -apple-system, sans-serif;
    touch-action: none;
    user-select: none;
  }

  #wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  canvas {
    display: block;
    width: 100%;
    flex: 1;
    background: #5c94fc;
    touch-action: none;
  }

  /* Controles táctiles fijos abajo */
  #controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
    background: #16213e;
    flex-shrink: 0;
  }

  .btn-group {
    display: flex;
    gap: 12px;
  }

  .btn {
    width: 72px;
    height: 72px;
    border: none;
    border-radius: 16px;
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    background: #0f3460;
    box-shadow: 0 4px 0 #071e36;
    cursor: pointer;
  }

  .btn:active, .btn.pressed {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #071e36;
    background: #1a4a7a;
  }

  #btnJump {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: #e94560;
    box-shadow: 0 4px 0 #a01f38;
    font-size: 18px;
  }

  #btnJump:active, #btnJump.pressed {
    box-shadow: 0 1px 0 #a01f38;
    background: #ff6b81;
  }

  /* Pantalla de victoria */
  #win {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10, 10, 30, 0.82);
    z-index: 10;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  #win.show { display: flex; }

  #win h1 {
    color: #fff;
    font-size: clamp(1.6rem, 7vw, 2.4rem);
    line-height: 1.25;
    max-width: 340px;
    margin-bottom: 28px;
  }

  #win .heart {
    color: #ff3b5c;
    font-size: 1.15em;
  }

  #restart {
    border: none;
    background: #e94560;
    color: #fff;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 4px 0 #a01f38;
  }

  #restart:active { transform: translateY(2px); box-shadow: 0 2px 0 #a01f38; }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game"></canvas>

    <div id="controls">
      <div class="btn-group">
        <button class="btn" id="btnLeft" type="button" aria-label="Izquierda">◀</button>
        <button class="btn" id="btnRight" type="button" aria-label="Derecha">▶</button>
      </div>
      <button class="btn" id="btnJump" type="button" aria-label="Saltar">SALTO</button>
    </div>

    <div id="win">
      <h1>Gracias por darme una oportunidad <span class="heart">♥</span></h1>
      <button id="restart" type="button">Reiniciar</button>
    </div>
  </div>

<script>
(() => {
  // ========== SETUP DEL CANVAS ==========
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const winScreen = document.getElementById('win');
  const btnLeft = document.getElementById('btnLeft');
  const btnRight = document.getElementById('btnRight');
  const btnJump = document.getElementById('btnJump');
  const btnRestart = document.getElementById('restart');

  // Mundo del nivel (coordenadas lógicas; la cámara sigue al jugador)
  const WORLD_W = 2400;
  const WORLD_H = 480;
  const TILE = 40;

  let W = 0, H = 0, scale = 1;
  let cameraX = 0;
  let won = false;
  let lastTime = 0;

  // ========== ENTRADA (teclado + táctil) ==========
  const keys = { left: false, right: false, jump: false };
  let jumpPressed = false; // edge: solo salta al pulsar, no al mantener

  function bindHold(el, on, off) {
    const start = (e) => { e.preventDefault(); on(); el.classList.add('pressed'); };
    const end = (e) => { e.preventDefault(); off(); el.classList.remove('pressed'); };
    el.addEventListener('touchstart', start, { passive: false });
    el.addEventListener('touchend', end, { passive: false });
    el.addEventListener('touchcancel', end, { passive: false });
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', end);
    el.addEventListener('mouseleave', end);
  }

  bindHold(btnLeft, () => { keys.left = true; }, () => { keys.left = false; });
  bindHold(btnRight, () => { keys.right = true; }, () => { keys.right = false; });
  bindHold(
    btnJump,
    () => { if (!keys.jump) jumpPressed = true; keys.jump = true; },
    () => { keys.jump = false; }
  );

  window.addEventListener('keydown', (e) => {
    if (['ArrowLeft', 'a', 'A'].includes(e.key)) { keys.left = true; e.preventDefault(); }
    if (['ArrowRight', 'd', 'D'].includes(e.key)) { keys.right = true; e.preventDefault(); }
    if (['ArrowUp', 'w', 'W', ' ', 'Spacebar'].includes(e.key)) {
      if (!keys.jump) jumpPressed = true;
      keys.jump = true;
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (['ArrowLeft', 'a', 'A'].includes(e.key)) keys.left = false;
    if (['ArrowRight', 'd', 'D'].includes(e.key)) keys.right = false;
    if (['ArrowUp', 'w', 'W', ' ', 'Spacebar'].includes(e.key)) keys.jump = false;
  });

  // ========== JUGADOR ==========
  const player = {
    x: 80,
    y: 200,
    w: 28,
    h: 36,
    vx: 0,
    vy: 0,
    onGround: false,
    facing: 1, // 1 derecha, -1 izquierda
    color: '#e94560'
  };

  // Física básica
  const GRAVITY = 1800;
  const MOVE_ACCEL = 2200;
  const MAX_SPEED = 260;
  const FRICTION = 1800;
  const JUMP_VEL = -620;

  // ========== PLATAFORMAS (bloques sólidos) ==========
  // Cada plataforma: { x, y, w, h }
  let platforms = [];
  let goal = null;

  function buildLevel() {
    platforms = [
      // Suelo continuo (varios tramos con huecos)
      { x: 0, y: 420, w: 520, h: 60 },
      { x: 600, y: 420, w: 280, h: 60 },
      { x: 960, y: 420, w: 400, h: 60 },
      { x: 1440, y: 420, w: 960, h: 60 },

      // Plataformas flotantes
      { x: 220, y: 320, w: 120, h: 24 },
      { x: 400, y: 250, w: 100, h: 24 },
      { x: 560, y: 300, w: 80, h: 24 },
      { x: 720, y: 240, w: 120, h: 24 },
      { x: 900, y: 300, w: 100, h: 24 },
      { x: 1100, y: 260, w: 140, h: 24 },
      { x: 1300, y: 200, w: 100, h: 24 },
      { x: 1480, y: 280, w: 120, h: 24 },
      { x: 1680, y: 220, w: 100, h: 24 },
      { x: 1860, y: 300, w: 140, h: 24 },
      { x: 2060, y: 240, w: 120, h: 24 }
    ];

    // Meta: bandera al final
    goal = { x: 2240, y: 300, w: 20, h: 120 };
  }

  // ========== COLISIONES AABB ==========
  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  // Resuelve colisión del jugador contra plataformas (eje por eje)
  function collidePlatforms() {
    player.onGround = false;

    // Horizontal
    player.x += player.vx * dt;
    for (const p of platforms) {
      if (!rectsOverlap(player, p)) continue;
      if (player.vx > 0) player.x = p.x - player.w;
      else if (player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }

    // Vertical
    player.y += player.vy * dt;
    for (const p of platforms) {
      if (!rectsOverlap(player, p)) continue;
      if (player.vy > 0) {
        // Aterriza encima
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0) {
        // Golpea con la cabeza
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }

    // Límites del mundo
    if (player.x < 0) { player.x = 0; player.vx = 0; }
    if (player.x + player.w > WORLD_W) { player.x = WORLD_W - player.w; player.vx = 0; }
    if (player.y > WORLD_H + 200) resetPlayer();
  }

  // ========== META ==========
  function checkGoal() {
    if (won) return;
    if (rectsOverlap(player, goal)) {
      won = true;
      winScreen.classList.add('show');
    }
  }

  function resetPlayer() {
    player.x = 80;
    player.y = 200;
    player.vx = 0;
    player.vy = 0;
    player.onGround = false;
    cameraX = 0;
  }

  function restart() {
    won = false;
    winScreen.classList.remove('show');
    keys.left = keys.right = keys.jump = false;
    jumpPressed = false;
    btnLeft.classList.remove('pressed');
    btnRight.classList.remove('pressed');
    btnJump.classList.remove('pressed');
    resetPlayer();
  }

  btnRestart.addEventListener('click', restart);
  btnRestart.addEventListener('touchend', (e) => { e.preventDefault(); restart(); }, { passive: false });

  // ========== ACTUALIZACIÓN (física + controles) ==========
  let dt = 0;

  function update(frameDt) {
    if (won) return;
    dt = Math.min(frameDt, 0.033); // evita saltos grandes si el tab se pausa

    // Movimiento horizontal
    if (keys.left) {
      player.vx -= MOVE_ACCEL * dt;
      player.facing = -1;
    } else if (keys.right) {
      player.vx += MOVE_ACCEL * dt;
      player.facing = 1;
    } else {
      // Fricción en el suelo / aire
      if (player.vx > 0) player.vx = Math.max(0, player.vx - FRICTION * dt);
      else if (player.vx < 0) player.vx = Math.min(0, player.vx + FRICTION * dt);
    }
    player.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));

    // Salto (solo al pulsar y si está en el suelo)
    if (jumpPressed && player.onGround) {
      player.vy = JUMP_VEL;
      player.onGround = false;
    }
    jumpPressed = false;

    // Gravedad
    player.vy += GRAVITY * dt;
    if (player.vy > 900) player.vy = 900;

    collidePlatforms();
    checkGoal();

    // Cámara sigue al jugador
    const viewW = canvas.width / scale;
    cameraX = player.x + player.w / 2 - viewW / 2;
    cameraX = Math.max(0, Math.min(WORLD_W - viewW, cameraX));
  }

  // ========== DIBUJO ==========
  function drawBackground() {
    // Cielo
    ctx.fillStyle = '#5c94fc';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Nubes simples (paralaje suave)
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    const clouds = [
      [120, 60, 70], [400, 90, 90], [780, 50, 60],
      [1100, 80, 80], [1500, 55, 70], [1900, 95, 85], [2200, 70, 60]
    ];
    for (const [cx, cy, r] of clouds) {
      const sx = (cx - cameraX * 0.4) * scale;
      const sy = cy * scale;
      ctx.beginPath();
      ctx.arc(sx, sy, r * scale * 0.45, 0, Math.PI * 2);
      ctx.arc(sx + r * 0.4 * scale, sy + 4 * scale, r * scale * 0.35, 0, Math.PI * 2);
      ctx.arc(sx - r * 0.35 * scale, sy + 6 * scale, r * scale * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Colinas lejanas
    ctx.fillStyle = '#3cb043';
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    for (let x = 0; x <= WORLD_W; x += 80) {
      const sx = (x - cameraX * 0.2) * scale;
      const h = 80 + Math.sin(x * 0.01) * 30;
      ctx.lineTo(sx, canvas.height - h * scale);
    }
    ctx.lineTo(canvas.width, canvas.height);
    ctx.fill();
  }

  function drawPlatforms() {
    for (const p of platforms) {
      const x = (p.x - cameraX) * scale;
      const y = p.y * scale;
      const w = p.w * scale;
      const h = p.h * scale;

      // Tierra
      ctx.fillStyle = '#c84c0c';
      ctx.fillRect(x, y, w, h);
      // Césped arriba
      ctx.fillStyle = '#00a800';
      ctx.fillRect(x, y, w, Math.min(10 * scale, h * 0.35));
      // Líneas de ladrillo
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      for (let bx = 0; bx < p.w; bx += TILE) {
        ctx.strokeRect(x + bx * scale, y, TILE * scale, h);
      }
    }
  }

  function drawGoal() {
    const x = (goal.x - cameraX) * scale;
    const y = goal.y * scale;
    const poleH = goal.h * scale;

    // Asta
    ctx.fillStyle = '#ddd';
    ctx.fillRect(x + 6 * scale, y, 4 * scale, poleH);
    // Bandera
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(x + 10 * scale, y);
    ctx.lineTo(x + 10 * scale + 40 * scale, y + 16 * scale);
    ctx.lineTo(x + 10 * scale, y + 32 * scale);
    ctx.closePath();
    ctx.fill();
    // Base
    ctx.fillStyle = '#888';
    ctx.fillRect(x, y + poleH, 16 * scale, 8 * scale);
  }

  function drawPlayer() {
    const x = (player.x - cameraX) * scale;
    const y = player.y * scale;
    const w = player.w * scale;
    const h = player.h * scale;

    // Cuerpo
    ctx.fillStyle = player.color;
    ctx.fillRect(x, y + 8 * scale, w, h - 8 * scale);
    // Cabeza
    ctx.fillStyle = '#ffccaa';
    ctx.fillRect(x + 4 * scale, y, w - 8 * scale, 14 * scale);
    // Ojo
    ctx.fillStyle = '#111';
    const eyeX = player.facing > 0 ? x + w - 10 * scale : x + 4 * scale;
    ctx.fillRect(eyeX, y + 4 * scale, 5 * scale, 5 * scale);
    // Sombrero
    ctx.fillStyle = '#e94560';
    ctx.fillRect(x + 2 * scale, y - 4 * scale, w - 4 * scale, 6 * scale);
    // Piernas
    ctx.fillStyle = '#1a4a7a';
    ctx.fillRect(x + 2 * scale, y + h - 10 * scale, 10 * scale, 10 * scale);
    ctx.fillRect(x + w - 12 * scale, y + h - 10 * scale, 10 * scale, 10 * scale);
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(8 * scale, 8 * scale, 150 * scale, 28 * scale);
    ctx.fillStyle = '#fff';
    ctx.font = `${14 * scale}px system-ui, sans-serif`;
    ctx.fillText('Llega a la bandera →', 16 * scale, 27 * scale);
  }

  function draw() {
    drawBackground();
    drawPlatforms();
    drawGoal();
    drawPlayer();
    drawHUD();
  }

  // ========== RESIZE RESPONSIVE ==========
  function resize() {
    const controlsH = document.getElementById('controls').offsetHeight;
    const availH = window.innerHeight - controlsH;
    const availW = window.innerWidth;

    // Escala para que quepa la altura del mundo en la pantalla
    scale = availH / WORLD_H;
    // Limitar un poco en pantallas muy anchas
    const viewW = availW / scale;
    canvas.width = Math.floor(availW);
    canvas.height = Math.floor(availH);
    // Si el viewport lógico es más ancho que el mundo, no pasa nada
    void viewW;
  }

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 100));

  // ========== LOOP ==========
  function loop(ts) {
    if (!lastTime) lastTime = ts;
    const frameDt = (ts - lastTime) / 1000;
    lastTime = ts;
    update(frameDt);
    draw();
    requestAnimationFrame(loop);
  }

  // Inicio
  buildLevel();
  resize();
  resetPlayer();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
