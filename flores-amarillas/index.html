<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flores Amarillas para ti</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: #f6efe3;
    font-family: 'Quicksand', sans-serif;
    color: #3d2a14;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .stage {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.2rem 1rem 2rem;
  }

  .title {
    text-align: center;
    z-index: 2;
  }

  .title h1 {
    font-family: 'Caveat', cursive;
    font-size: clamp(2.2rem, 9vw, 3.2rem);
    color: #d4a017;
    line-height: 1;
    text-shadow: 0 2px 0 rgba(255,255,255,.5);
  }

  .title p {
    margin-top: .25rem;
    font-size: .78rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #8a6a3a;
  }

  .scene {
    position: relative;
    width: min(94vw, 380px);
    aspect-ratio: 3 / 4;
    margin-top: 1rem;
    border-radius: 22px;
    overflow: hidden;
    background:
      radial-gradient(circle at 78% 14%, rgba(255, 220, 90, .45), transparent 28%),
      linear-gradient(180deg, #fff8ea 0%, #f3e6cf 55%, #e8d7b4 100%);
    box-shadow:
      0 0 0 1px rgba(120, 80, 30, .12),
      0 22px 50px rgba(90, 55, 20, .16);
  }

  .grass {
    position: absolute;
    left: -8%;
    right: -8%;
    bottom: -2%;
    height: 26%;
    background: linear-gradient(180deg, #b8d978 0%, #7fad4a 70%, #6a963c 100%);
    border-radius: 50% 50% 0 0 / 55% 55% 0 0;
    z-index: 1;
  }

  .grass::before,
  .grass::after {
    content: '';
    position: absolute;
    bottom: 55%;
    width: 10px;
    height: 28px;
    background: #6f9e3f;
    border-radius: 40% 40% 10% 10%;
    transform-origin: 50% 100%;
  }
  .grass::before { left: 18%; transform: rotate(-18deg); }
  .grass::after { right: 22%; transform: rotate(16deg); height: 34px; }

  .art {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
  }

  .tree-group {
    transform-origin: 190px 470px;
    transform: scale(0.15);
    opacity: 0;
    transition: transform 1.5s cubic-bezier(.22,1,.36,1), opacity .5s ease;
  }

  .tree-group.grown {
    transform: scale(1);
    opacity: 1;
  }

  .flower-node {
    transform-box: fill-box;
    transform-origin: center;
    opacity: 0;
    transform: scale(0);
  }

  .flower-node.show {
    animation: bloom .75s cubic-bezier(.2,1.2,.3,1) forwards;
  }

  .flower-node.sway {
    opacity: 1;
    transform: scale(1);
    animation: sway 3.4s ease-in-out infinite;
  }

  @keyframes bloom {
    0% { opacity: 0; transform: scale(0) rotate(-25deg); }
    65% { opacity: 1; transform: scale(1.15) rotate(5deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-4deg); }
    50% { transform: rotate(4deg); }
  }

  .petal-fall {
    position: absolute;
    width: 18px;
    height: 18px;
    pointer-events: none;
    z-index: 5;
    animation: fall linear forwards;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,.12));
  }

  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(460px) rotate(420deg) scale(.7); opacity: 0; }
  }

  .message {
    margin-top: 1.25rem;
    text-align: center;
    max-width: 320px;
    opacity: 0;
    transform: translateY(18px);
    transition: .9s ease;
  }

  .message.show {
    opacity: 1;
    transform: none;
  }

  .message .line {
    font-family: 'Caveat', cursive;
    font-size: clamp(1.7rem, 7vw, 2.2rem);
    color: #c49200;
    line-height: 1.2;
  }

  .message .sub {
    margin-top: .35rem;
    font-size: .95rem;
    color: #7a5a30;
  }

  .cta, .again {
    margin-top: 1.2rem;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    border-radius: 999px;
    cursor: pointer;
  }

  .cta {
    border: none;
    background: linear-gradient(180deg, #ffd95a, #f0b400);
    color: #4a3000;
    font-size: 1rem;
    padding: .9rem 1.7rem;
    box-shadow: 0 12px 28px rgba(200, 140, 0, .3);
  }

  .cta:active { transform: scale(.97); }
  .cta.hidden { display: none; }

  .again {
    background: transparent;
    border: 1px solid rgba(120, 80, 30, .28);
    color: #5a3d1c;
    font-size: .88rem;
    padding: .55rem 1.15rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s;
  }

  .again.show {
    opacity: .8;
    pointer-events: auto;
  }
</style>
</head>
<body>

    <div class="title">

      <p>para dedicar</p>
    </div>

          <ellipse cx="250" cy="325" rx="18" ry="9" fill="url(#leafGrad)" transform="rotate(30 250 325)" opacity=".9"/>
          <ellipse cx="150" cy="220" rx="14" ry="7" fill="url(#leafGrad)" transform="rotate(-40 150 220)" opacity=".85"/>

            <g transform="translate(175 175)"><g class="flower-node"><use href="#sunflower" transform="scale(.8)"/></g></g>
            <g transform="translate(210 170)"><g class="flower-node"><use href="#sunflower" transform="scale(.82)"/></g></g>
            <g transform="translate(95 205)"><g class="flower-node"><use href="#sunflower" transform="scale(1.05)"/></g></g>
            <g transform="translate(295 185)"><g class="flower-node"><use href="#sunflower" transform="scale(1.1)"/></g></g>

            <g transform="translate(225 190)"><g class="flower-node"><use href="#sunflower" transform="scale(.74)"/></g></g>

        <!-- flores en el pasto / suelo -->
        <g filter="url(#soft)" id="ground-flowers">
          <g transform="translate(48 455)"><g class="flower-node"><use href="#sunflower" transform="scale(.55)"/></g></g>
          <g transform="translate(82 468)"><g class="flower-node"><use href="#sunflower" transform="scale(.48)"/></g></g>

    </div>

    <div class="message" id="message">
      <p class="line">Estas flores son para ti</p>
      <p class="sub">porque mereces algo bonito hoy</p>
    </div>

    <button class="cta" id="start">Abrir flores</button>
    <button class="again" id="again">ver de nuevo</button>
  </div>

<script>
  const tree = document.getElementById('tree');
  const scene = document.getElementById('scene');
  const message = document.getElementById('message');
  const start = document.getElementById('start');
  const again = document.getElementById('again');
  const nodes = () => [...document.querySelectorAll('.flower-node')];

  function resetFlowers() {
    nodes().forEach(n => {
      n.classList.remove('show', 'sway');
      n.style.animationDelay = '';
    });
  }

  function bloom() {
    nodes().forEach((n, i) => {
      setTimeout(() => {
        n.classList.add('show');
        setTimeout(() => {
          n.classList.remove('show');
          n.classList.add('sway');
          n.style.animationDelay = (i % 7) * 0.12 + 's';
        }, 700);
      }, 80 + i * 45);
    });
  }

  function makeFallingPetal() {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '-10 -20 20 30');
    svg.classList.add('petal-fall');
    svg.style.left = (10 + Math.random() * 80) + '%';
    svg.style.top = (6 + Math.random() * 18) + '%';
    svg.style.animationDuration = (2.6 + Math.random() * 2) + 's';
    const e = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
    e.setAttribute('cx', '0');
    e.setAttribute('cy', '-8');
    e.setAttribute('rx', '5');
    e.setAttribute('ry', '11');
    e.setAttribute('fill', Math.random() > .5 ? '#ffcc22' : '#ffe566');
    svg.appendChild(e);
    scene.appendChild(svg);
    setTimeout(() => svg.remove(), 5000);
  }

  function spawnFalling() {
    for (let i = 0; i < 28; i++) {
      setTimeout(makeFallingPetal, i * 120);
    }
  }

  function play() {
    start.classList.add('hidden');
    again.classList.remove('show');
    message.classList.remove('show');
    tree.classList.remove('grown');
    resetFlowers();

    requestAnimationFrame(() => {
      tree.classList.add('grown');
      setTimeout(bloom, 850);
      setTimeout(() => {
        message.classList.add('show');
        spawnFalling();
        again.classList.add('show');
      }, 3200);
    });
  }

  start.addEventListener('click', play);
  again.addEventListener('click', play);
</script>
</body>
</html>
