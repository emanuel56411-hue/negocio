<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flores de Alvarito</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Nunito:wght@600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b1a12;
    --lime: #b8f26e;
    --croc: #3d9e4a;
    --croc-dark: #2a6f34;
    --belly: #c8e87a;
    --gold: #ffd84a;
    --gold-deep: #f0b400;
    --cream: #fff6df;
  }

  html, body {
    min-height: 100%;
    background:
      radial-gradient(ellipse at 50% 20%, #163524 0%, var(--bg) 60%);
    font-family: 'Nunito', sans-serif;
    color: var(--cream);
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .stage {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1rem 2.2rem;
    text-align: center;
  }

  .badge {
    font-size: .72rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--lime);
    opacity: .75;
    margin-bottom: .6rem;
  }

  h1 {
    font-family: 'Caveat', cursive;
    font-size: clamp(2.1rem, 9vw, 3.2rem);
    line-height: 1.05;
    color: var(--gold);
    max-width: 340px;
    margin-bottom: .35rem;
  }

  .sub {
    font-size: .95rem;
    opacity: .65;
    margin-bottom: 1.2rem;
  }

  .scene {
    position: relative;
    width: min(92vw, 360px);
    aspect-ratio: 1 / 1.05;
    border-radius: 28px;
    background:
      radial-gradient(circle at 50% 30%, rgba(184, 242, 110, .12), transparent 50%),
      linear-gradient(180deg, #12281c, #0d1f15);
    box-shadow:
      0 0 0 1px rgba(184, 242, 110, .15),
      0 24px 50px rgba(0, 0, 0, .45);
    overflow: hidden;
  }

  .art {
    width: 100%;
    height: 100%;
    display: block;
  }

  .croc {
    transform-origin: 180px 280px;
    animation: bob 2.8s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .arm-offer {
    transform-origin: 230px 210px;
    animation: offer 2.4s ease-in-out infinite;
  }

  @keyframes offer {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(-8deg) translate(4px, -6px); }
  }

  .bouquet {
    transform-origin: 268px 150px;
    animation: bloomIn 1.2s cubic-bezier(.2,1.2,.3,1) both, sway 3s ease-in-out 1.2s infinite;
  }

  @keyframes bloomIn {
    0% { opacity: 0; transform: scale(.3) rotate(-20deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(4deg); }
  }

  .spark {
    animation: sparkle 1.8s ease-in-out infinite;
  }
  .spark:nth-child(2) { animation-delay: .4s; }
  .spark:nth-child(3) { animation-delay: .8s; }

  @keyframes sparkle {
    0%, 100% { opacity: .2; transform: scale(.7); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  .msg {
    margin-top: 1.4rem;
    max-width: 320px;
  }

  .msg .line {
    font-family: 'Caveat', cursive;
    font-size: clamp(1.6rem, 6.5vw, 2.1rem);
    color: var(--cream);
    line-height: 1.2;
  }

  .msg .from {
    margin-top: .45rem;
    font-size: .85rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--lime);
    opacity: .8;
  }

  .hearts {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .heart {
    position: absolute;
    bottom: 10%;
    font-size: 14px;
    color: #ff6b8a;
    animation: rise linear forwards;
    opacity: 0;
  }

  @keyframes rise {
    0% { transform: translateY(0) scale(.6); opacity: 0; }
    15% { opacity: .9; }
    100% { transform: translateY(-320px) scale(1.2); opacity: 0; }
  }
</style>
</head>
<body>
  <div class="stage">
    <p class="badge">Alvarito · Coco</p>
    <h1>Estas flores son para la más linda</h1>
    <p class="sub">con cariño del cocodrilo</p>

    <div class="scene" id="scene">
      <div class="hearts" id="hearts"></div>
      <svg class="art" viewBox="0 0 360 380" xmlns="http://www.w3.org/2000/svg" aria-label="Cocodrilo de Alvarito ofreciendo flores">
        <defs>
          <radialGradient id="petal" cx="35%" cy="25%" r="75%">
            <stop offset="0%" stop-color="#ffe566"/>
            <stop offset="60%" stop-color="#ffcc22"/>
            <stop offset="100%" stop-color="#e8a400"/>
          </radialGradient>
          <radialGradient id="center" cx="40%" cy="35%" r="70%">
            <stop offset="0%" stop-color="#8b5a22"/>
            <stop offset="100%" stop-color="#4a2a0c"/>
          </radialGradient>
          <linearGradient id="crocBody" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4db85a"/>
            <stop offset="100%" stop-color="#2f7a3a"/>
          </linearGradient>
          <linearGradient id="crocBelly" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d4f08a"/>
            <stop offset="100%" stop-color="#a8d45a"/>
          </linearGradient>
          <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000" flood-opacity=".35"/>
          </filter>

          <g id="flower">
            <ellipse cx="0" cy="-14" rx="6" ry="13" fill="url(#petal)" transform="rotate(0)"/>
            <ellipse cx="0" cy="-14" rx="6" ry="13" fill="url(#petal)" transform="rotate(45)"/>
            <ellipse cx="0" cy="-14" rx="6" ry="13" fill="url(#petal)" transform="rotate(90)"/>
            <ellipse cx="0" cy="-14" rx="6" ry="13" fill="url(#petal)" transform="rotate(135)"/>
            <ellipse cx="0" cy="-14" rx="6" ry="13" fill="url(#petal)" transform="rotate(180)"/>
            <ellipse cx="0" cy="-14" rx="6" ry="13" fill="url(#petal)" transform="rotate(225)"/>
            <ellipse cx="0" cy="-14" rx="6" ry="13" fill="url(#petal)" transform="rotate(270)"/>
            <ellipse cx="0" cy="-14" rx="6" ry="13" fill="url(#petal)" transform="rotate(315)"/>
            <circle cx="0" cy="0" r="7.5" fill="url(#center)"/>
          </g>
        </defs>

        <!-- suelo suave -->
        <ellipse cx="180" cy="340" rx="120" ry="18" fill="#1a3a24" opacity=".7"/>

        <g class="croc" filter="url(#soft)">
          <!-- cola -->
          <path d="M70 250 C40 240, 28 255, 35 275 C45 295, 70 290, 95 275 Z" fill="url(#crocBody)"/>
          <path d="M42 255 L38 248 L48 252 M48 268 L42 275 L55 270 M58 282 L55 290 L68 282" fill="#2a6f34"/>

          <!-- cuerpo -->
          <ellipse cx="155" cy="255" rx="78" ry="55" fill="url(#crocBody)"/>
          <ellipse cx="158" cy="268" rx="48" ry="32" fill="url(#crocBelly)"/>

          <!-- patas -->
          <ellipse cx="115" cy="300" rx="18" ry="12" fill="#2f7a3a"/>
          <ellipse cx="185" cy="302" rx="18" ry="12" fill="#2f7a3a"/>
          <rect x="102" y="305" width="8" height="10" rx="2" fill="#245c2c"/>
          <rect x="112" y="305" width="8" height="10" rx="2" fill="#245c2c"/>
          <rect x="122" y="305" width="8" height="10" rx="2" fill="#245c2c"/>
          <rect x="172" y="307" width="8" height="10" rx="2" fill="#245c2c"/>
          <rect x="182" y="307" width="8" height="10" rx="2" fill="#245c2c"/>
          <rect x="192" y="307" width="8" height="10" rx="2" fill="#245c2c"/>

          <!-- brazo izquierdo (atrás) -->
          <ellipse cx="105" cy="230" rx="14" ry="28" fill="#3d9e4a" transform="rotate(-25 105 230)"/>

          <!-- cabeza -->
          <ellipse cx="210" cy="195" rx="58" ry="42" fill="url(#crocBody)"/>
          <!-- hocico -->
          <ellipse cx="255" cy="205" rx="42" ry="26" fill="url(#crocBody)"/>
          <ellipse cx="258" cy="212" rx="30" ry="14" fill="url(#crocBelly)"/>
          <!-- dientes -->
          <polygon points="235,218 240,228 245,218" fill="#fff"/>
          <polygon points="250,220 255,230 260,220" fill="#fff"/>
          <polygon points="265,220 270,229 275,220" fill="#fff"/>
          <!-- ojos -->
          <ellipse cx="195" cy="175" rx="14" ry="16" fill="#fff"/>
          <ellipse cx="225" cy="172" rx="14" ry="16" fill="#fff"/>
          <circle cx="198" cy="178" r="7" fill="#1a1a1a"/>
          <circle cx="228" cy="175" r="7" fill="#1a1a1a"/>
          <circle cx="200" cy="175" r="2.2" fill="#fff"/>
          <circle cx="230" cy="172" r="2.2" fill="#fff"/>
          <!-- cejas / crestas -->
          <ellipse cx="195" cy="158" rx="10" ry="6" fill="#2a6f34"/>
          <ellipse cx="225" cy="155" rx="10" ry="6" fill="#2a6f34"/>
          <!-- nariz -->
          <circle cx="280" cy="198" r="3.5" fill="#1f4d28"/>
          <circle cx="290" cy="200" r="3.5" fill="#1f4d28"/>
          <!-- sonrisa -->
          <path d="M235 215 Q258 228 285 214" fill="none" stroke="#1f4d28" stroke-width="2.5" stroke-linecap="round"/>

          <!-- brazo derecho ofreciendo -->
          <g class="arm-offer">
            <ellipse cx="235" cy="225" rx="16" ry="36" fill="#3d9e4a" transform="rotate(35 235 225)"/>
            <ellipse cx="258" cy="195" rx="14" ry="12" fill="#4db85a"/>
            <!-- manita -->
            <circle cx="268" cy="185" r="10" fill="#4db85a"/>
          </g>
        </g>

        <!-- ramo de flores que entrega -->
        <g class="bouquet" filter="url(#soft)">
          <line x1="268" y1="185" x2="268" y2="145" stroke="#3f8a35" stroke-width="3" stroke-linecap="round"/>
          <line x1="268" y1="170" x2="250" y2="140" stroke="#3f8a35" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="268" y1="170" x2="286" y2="138" stroke="#3f8a35" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="268" y1="165" x2="240" y2="155" stroke="#3f8a35" stroke-width="2" stroke-linecap="round"/>
          <line x1="268" y1="165" x2="296" y2="152" stroke="#3f8a35" stroke-width="2" stroke-linecap="round"/>

          <use href="#flower" transform="translate(268 128) scale(1.15)"/>
          <use href="#flower" transform="translate(248 138) scale(.95)"/>
          <use href="#flower" transform="translate(288 136) scale(1)"/>
          <use href="#flower" transform="translate(238 158) scale(.75)"/>
          <use href="#flower" transform="translate(298 155) scale(.8)"/>
          <use href="#flower" transform="translate(258 148) scale(.7)"/>
          <use href="#flower" transform="translate(278 145) scale(.72)"/>
        </g>

        <!-- brillos -->
        <g fill="#ffe566">
          <circle class="spark" cx="220" cy="100" r="3"/>
          <circle class="spark" cx="300" cy="110" r="2.5"/>
          <circle class="spark" cx="250" cy="85" r="2"/>
        </g>
      </svg>
    </div>

    <div class="msg">
      <p class="line">Estas flores son para la más linda</p>
      <p class="from">— Alvarito &amp; Coco 🐊</p>
    </div>
  </div>

<script>
  const hearts = document.getElementById('hearts');
  function spawnHeart() {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = Math.random() > .5 ? '💛' : '🌻';
    h.style.left = (15 + Math.random() * 70) + '%';
    h.style.animationDuration = (2.5 + Math.random() * 2) + 's';
    hearts.appendChild(h);
    setTimeout(() => h.remove(), 4500);
  }
  setInterval(spawnHeart, 700);
  for (let i = 0; i < 4; i++) setTimeout(spawnHeart, i * 200);
</script>
</body>
</html>
