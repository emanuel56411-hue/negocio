<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Estas flores son para la más linda</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background:
      radial-gradient(ellipse at 50% 0%, #fff5f7 0%, #ffe8ee 40%, #f5d6de 100%);
    font-family: 'Quicksand', sans-serif;
    color: #3a1f28;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .stage {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.4rem 1rem 2rem;
    text-align: center;
  }

  h1 {
    font-family: 'Caveat', cursive;
    font-size: clamp(2rem, 8.5vw, 3rem);
    line-height: 1.1;
    color: #c9184a;
    max-width: 340px;
    margin-bottom: 1rem;
  }

  .scene {
    position: relative;
    width: min(92vw, 360px);
    aspect-ratio: 1 / 1.05;
    background: #fff;
    border-radius: 24px;
    box-shadow:
      0 0 0 1px rgba(180, 60, 90, .1),
      0 20px 45px rgba(120, 40, 60, .12);
    overflow: hidden;
  }

  .croc-wrap {
    position: absolute;
    left: 50%;
    bottom: 4%;
    width: 78%;
    transform: translateX(-54%);
    animation: bob 3s ease-in-out infinite;
    z-index: 1;
  }

  .croc-wrap img {
    width: 100%;
    height: auto;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  @keyframes bob {
    0%, 100% { transform: translateX(-54%) translateY(0); }
    50% { transform: translateX(-54%) translateY(-6px); }
  }

  .roses {
    position: absolute;
    right: 6%;
    top: 18%;
    width: 48%;
    z-index: 2;
    transform-origin: 30% 90%;
    animation: offer 2.6s ease-in-out infinite;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.12));
  }

  @keyframes offer {
    0%, 100% { transform: rotate(-6deg) translateY(0); }
    50% { transform: rotate(-12deg) translateY(-8px); }
  }

  .roses svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .petals {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 3;
  }

  .petal {
    position: absolute;
    top: -10%;
    width: 12px;
    height: 16px;
    background: radial-gradient(circle at 30% 30%, #ff6b8a, #c9184a);
    border-radius: 50% 50% 50% 0;
    transform: rotate(45deg);
    animation: fall linear forwards;
    opacity: .85;
  }

  @keyframes fall {
    0% { transform: translateY(0) rotate(45deg); opacity: .9; }
    100% { transform: translateY(420px) rotate(320deg); opacity: 0; }
  }
</style>
</head>
<body>
  <div class="stage">
    <h1>Estas flores son para la más linda</h1>

    <div class="scene" id="scene">
      <div class="petals" id="petals"></div>

      <div class="croc-wrap">
        <img src="cocodrilo.png" alt="Cocodrilo ofreciendo rosas" width="512" height="512">
      </div>

      <div class="roses" aria-hidden="true">
        <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="r1" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#ff7a9a"/>
              <stop offset="55%" stop-color="#e02355"/>
              <stop offset="100%" stop-color="#9e1038"/>
            </radialGradient>
            <radialGradient id="r2" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#ff8fab"/>
              <stop offset="60%" stop-color="#d4184a"/>
              <stop offset="100%" stop-color="#8a0e30"/>
            </radialGradient>
            <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#5aaa3a"/>
              <stop offset="100%" stop-color="#2f6e22"/>
            </linearGradient>
            <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#7ec85a"/>
              <stop offset="100%" stop-color="#3f8a35"/>
            </linearGradient>
          </defs>

          <!-- tallos -->
          <path d="M100 210 C98 160, 95 120, 88 85" fill="none" stroke="url(#stem)" stroke-width="4" stroke-linecap="round"/>
          <path d="M100 210 C110 165, 125 125, 140 95" fill="none" stroke="url(#stem)" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M100 210 C85 170, 70 135, 55 105" fill="none" stroke="url(#stem)" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M100 200 C115 155, 145 130, 165 115" fill="none" stroke="url(#stem)" stroke-width="3" stroke-linecap="round"/>
          <path d="M100 200 C80 160, 50 140, 35 125" fill="none" stroke="url(#stem)" stroke-width="3" stroke-linecap="round"/>

          <!-- hojas -->
          <ellipse cx="78" cy="145" rx="16" ry="8" fill="url(#leaf)" transform="rotate(-35 78 145)"/>
          <ellipse cx="125" cy="155" rx="15" ry="7" fill="url(#leaf)" transform="rotate(40 125 155)"/>
          <ellipse cx="70" cy="175" rx="12" ry="6" fill="url(#leaf)" transform="rotate(-50 70 175)"/>

          <!-- rosa centro -->
          <g transform="translate(88 70)">
            <circle cx="0" cy="4" r="18" fill="url(#r1)"/>
            <circle cx="-8" cy="-2" r="11" fill="url(#r2)" opacity=".95"/>
            <circle cx="9" cy="-1" r="11" fill="url(#r1)" opacity=".95"/>
            <circle cx="0" cy="-10" r="10" fill="url(#r2)"/>
            <circle cx="-6" cy="8" r="9" fill="#c9184a"/>
            <circle cx="7" cy="9" r="9" fill="#b01440"/>
            <circle cx="0" cy="0" r="7" fill="#ff9bb0"/>
            <circle cx="0" cy="0" r="3.5" fill="#fff0f4" opacity=".7"/>
          </g>

          <!-- rosa derecha -->
          <g transform="translate(142 88) scale(.9)">
            <circle cx="0" cy="4" r="18" fill="url(#r2)"/>
            <circle cx="-8" cy="-2" r="11" fill="url(#r1)" opacity=".95"/>
            <circle cx="9" cy="-1" r="11" fill="url(#r2)" opacity=".95"/>
            <circle cx="0" cy="-10" r="10" fill="url(#r1)"/>
            <circle cx="-6" cy="8" r="9" fill="#c9184a"/>
            <circle cx="7" cy="9" r="9" fill="#9e1038"/>
            <circle cx="0" cy="0" r="7" fill="#ff8fab"/>
            <circle cx="0" cy="0" r="3.5" fill="#fff0f4" opacity=".65"/>
          </g>

          <!-- rosa izquierda -->
          <g transform="translate(52 98) scale(.85)">
            <circle cx="0" cy="4" r="18" fill="url(#r1)"/>
            <circle cx="-8" cy="-2" r="11" fill="url(#r2)" opacity=".95"/>
            <circle cx="9" cy="-1" r="11" fill="url(#r1)" opacity=".95"/>
            <circle cx="0" cy="-10" r="10" fill="url(#r2)"/>
            <circle cx="-6" cy="8" r="9" fill="#b01440"/>
            <circle cx="7" cy="9" r="9" fill="#c9184a"/>
            <circle cx="0" cy="0" r="7" fill="#ff9bb0"/>
            <circle cx="0" cy="0" r="3.5" fill="#fff0f4" opacity=".65"/>
          </g>

          <!-- rosa pequeña der -->
          <g transform="translate(168 112) scale(.65)">
            <circle cx="0" cy="4" r="18" fill="url(#r2)"/>
            <circle cx="-8" cy="-2" r="11" fill="#e02355"/>
            <circle cx="9" cy="-1" r="11" fill="#c9184a"/>
            <circle cx="0" cy="-10" r="10" fill="#d4184a"/>
            <circle cx="0" cy="0" r="6" fill="#ff8fab"/>
          </g>

          <!-- rosa pequeña izq -->
          <g transform="translate(32 122) scale(.6)">
            <circle cx="0" cy="4" r="18" fill="url(#r1)"/>
            <circle cx="-8" cy="-2" r="11" fill="#e02355"/>
            <circle cx="9" cy="-1" r="11" fill="#c9184a"/>
            <circle cx="0" cy="-10" r="10" fill="#d4184a"/>
            <circle cx="0" cy="0" r="6" fill="#ff9bb0"/>
          </g>
        </svg>
      </div>
    </div>

  </div>

<script>
  const petals = document.getElementById('petals');
  function spawn() {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = (10 + Math.random() * 80) + '%';
    p.style.animationDuration = (2.8 + Math.random() * 2.2) + 's';
    petals.appendChild(p);
    setTimeout(() => p.remove(), 5200);
  }
  setInterval(spawn, 450);
  for (let i = 0; i < 5; i++) setTimeout(spawn, i * 180);
</script>
</body>
</html>
